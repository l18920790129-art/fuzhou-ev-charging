services:
  - type: web
    name: ev-charging-platform
    env: node
    region: singapore
    plan: free
    buildCommand: npm install -g pnpm && pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    healthCheckPath: /api/trpc/maps.getDashboardStats
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        generateValue: false
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: VITE_AMAP_KEY
        sync: false
      - key: VITE_AMAP_SECURITY_CODE
        sync: false
      - key: BUILT_IN_FORGE_API_URL
        sync: false
      - key: BUILT_IN_FORGE_API_KEY
        sync: false
      - key: VITE_APP_ID
        sync: false
      - key: OAUTH_SERVER_URL
        sync: false
      - key: OWNER_OPEN_ID
        sync: false
      - key: OWNER_NAME
        sync: false
