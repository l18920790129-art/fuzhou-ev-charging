services:
  - type: web
    name: fuzhou-ev-charging
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "./docker-entrypoint.sh"
    envVars:
      - key: DJANGO_SETTINGS_MODULE
        value: fuzhou_ev_charging.settings
      - key: DEEPSEEK_API_KEY
        sync: false
      - key: AMAP_API_KEY
        value: 283b21e285a807bf7bda4cf43e838a26
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"
      - key: CHROMA_PERSIST_DIR
        value: "/opt/render/project/src/knowledge_base/chroma_db"
      - key: PYTHON_VERSION
        value: "3.11.11"
